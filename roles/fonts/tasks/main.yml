---
- name: Install Liberation fonts (metric-compatible with Microsoft)
  pacman:
    name: ttf-liberation
    state: present

- name: Install Inter font
  pacman:
    name: inter-font
    state: present

- name: Install Apple emoji font from AUR
  kewlfft.aur.aur:
    name: ttf-apple-emoji
    use: yay
    state: present
  become: true
  become_user: sn0w