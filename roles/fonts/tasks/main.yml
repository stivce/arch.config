---
- name: Install Liberation fonts (metric-compatible with Microsoft)
  pacman:
    name: ttf-liberation
    state: present

- name: Install Inter font
  pacman:
    name: inter-font
    state: present

- name: Install Apple emoji font from AUR
  shell: yay -S --noconfirm --needed ttf-apple-emoji
  become_user: "{{ local_user }}"
  register: result
  changed_when: "'installing' in result.stdout"
