---
- name: Install umu-launcher
  pacman:
    name: umu-launcher
    state: present

- name: Create games directory
  file:
    path: "{{ ansible_facts['user_dir'] }}/Games"
    state: directory
    mode: '0755'

- name: Download Battle.net installer
  command: >
    curl -fLo {{ ansible_facts['user_dir'] }}/Games/Battle.net-Setup.exe 
    https://downloader.battle.net/download/getInstaller?os=win&installer=Battle.net-Setup.exe
  args:
    creates: "{{ ansible_facts['user_dir'] }}/Games/Battle.net-Setup.exe"
  register: battlenet_installer

- name: Install Battle.net via umu-launcher
  command: >
    sh -c "WINEPREFIX={{ ansible_facts['user_dir'] }}/Games/battlenet GAMEID=umu-battlenet umu-run {{ ansible_facts['user_dir'] }}/Games/Battle.net-Setup.exe"
  when: battlenet_installer.changed
  changed_when: false
  timeout: 300

- name: Clean up installer
  file:
    path: "{{ ansible_facts['user_dir'] }}/Games/Battle.net-Setup.exe"
    state: absent
  when: battlenet_installer.changed