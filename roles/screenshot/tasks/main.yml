---
- name: Install screenshot dependencies
  pacman:
    name:
      - grim
      - slurp
    state: present

- name: Check whether screenshot AUR tools are installed
  command: pacman -Q {{ item }}
  register: screenshot_aur_query
  changed_when: false
  failed_when: false
  loop:
    - hyprquickframe
    - hyprshot

- name: Install missing screenshot AUR tools
  command: yay -S --noconfirm --needed {{ item.item }}
  become_user: "{{ local_user }}"
  loop: "{{ screenshot_aur_query.results }}"
  when: item.rc != 0
