---
- name: Install screenshot dependencies
  pacman:
    name:
      - grim
      - slurp
    state: present

- name: Install hyprquickframe from AUR
  shell: yay -S --noconfirm --needed hyprquickframe
  become_user: "{{ local_user }}"
  register: result
  changed_when: "'installing' in result.stdout"
