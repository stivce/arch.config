---
- name: Check whether zen-browser is installed
  command: pacman -Q zen-browser-bin
  register: zen_browser_query
  changed_when: false
  failed_when: false

- name: Install zen-browser from AUR
  command: yay -S --noconfirm --needed zen-browser-bin
  become_user: "{{ local_user }}"
  when: zen_browser_query.rc != 0

- name: Ensure Zen Browser distribution directory exists
  file:
    path: /opt/zen-browser-bin/distribution
    state: directory
    mode: '0755'

- name: Deploy Zen Browser policies (force-install extensions, disable auto-update)
  copy:
    dest: /opt/zen-browser-bin/distribution/policies.json
    content: |
      {
        "policies": {
          "DisableAppUpdate": true,
          "ExtensionSettings": {
            "uBlock0@raymondhill.net": {
              "installation_mode": "force_installed",
              "install_url": "https://addons.mozilla.org/firefox/downloads/latest/ublock-origin/latest.xpi"
            },
            "sponsorBlocker@ajay.app": {
              "installation_mode": "force_installed",
              "install_url": "https://addons.mozilla.org/firefox/downloads/latest/sponsorblock/latest.xpi"
            }
          }
        }
      }
    mode: '0644'

- name: Apply Zen Browser user preferences to all profiles
  command: "/home/{{ local_user }}/.local/bin/zen-apply-prefs"
  become_user: "{{ local_user }}"
  changed_when: false
  failed_when: false
