---
- name: Clone dotfiles repository
  git:
    repo: https://github.com/stivce/arch.dot.git
    dest: "/home/{{ local_user }}/.dotfiles"
    version: blade
    update: true
    force: true
  become_user: "{{ local_user }}"

- name: Check active dotfiles branch
  command: git -C /home/{{ local_user }}/.dotfiles rev-parse --abbrev-ref HEAD
  register: dotfiles_branch
  changed_when: false
  become_user: "{{ local_user }}"

- name: Ensure dotfiles branch is blade
  assert:
    that:
      - dotfiles_branch.stdout == 'blade'
    fail_msg: "Dotfiles branch is {{ dotfiles_branch.stdout }}, expected blade"

- name: Ensure Waybar battery module is present in blade dotfiles
  slurp:
    src: "/home/{{ local_user }}/.dotfiles/.config/waybar/config.jsonc"
  register: waybar_config_raw
  become_user: "{{ local_user }}"

- name: Validate Waybar battery module config
  assert:
    that:
      - (waybar_config_raw.content | b64decode) is regex('"modules-right"\\s*:\\s*\\[[^\\]]*"custom/battery"')
      - (waybar_config_raw.content | b64decode) is regex('"custom/battery"\\s*:\\s*\\{')
    fail_msg: "Waybar battery module is missing from .dotfiles/.config/waybar/config.jsonc"

- name: Persist battery script compatibility across battery device names
  copy:
    dest: "/home/{{ local_user }}/.dotfiles/.config/waybar/scripts/battery.sh"
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      battery_path="$(upower -e | awk '/battery_/ {print; exit}')"

      if [ -z "${battery_path}" ]; then
        exit 0
      fi

      battery_info="$(upower -i "${battery_path}")"
      percentage="$(printf '%s\n' "${battery_info}" | awk '/percentage:/ {print $2; exit}')"
      state="$(printf '%s\n' "${battery_info}" | awk '/state:/ {print $2; exit}')"

      if [ -z "${percentage}" ]; then
        exit 0
      fi

      case "${state}" in
        charging)
          printf '⚡ %s\n' "${percentage}"
          ;;
        fully-charged)
          printf '🔌 %s\n' "${percentage}"
          ;;
        *)
          printf '🔋 %s\n' "${percentage}"
          ;;
      esac
  become_user: "{{ local_user }}"

- name: Ensure Wofi scripts directory exists in dotfiles
  file:
    path: "/home/{{ local_user }}/.dotfiles/.config/wofi/scripts"
    state: directory
    mode: '0755'
  become_user: "{{ local_user }}"

- name: Persist Wofi power menu script in dotfiles
  copy:
    dest: "/home/{{ local_user }}/.dotfiles/.config/wofi/scripts/powermenu.sh"
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      choice="$(printf '%s\n' lock poweroff reboot suspend | wofi --dmenu --prompt 'Power')"

      case "${choice}" in
        lock)
          if [ -x "${HOME}/.config/hypr/start-hyprlock" ]; then
            "${HOME}/.config/hypr/start-hyprlock"
          elif [ -x "${HOME}/.config/hypr/scripts/hyprlock.sh" ]; then
            "${HOME}/.config/hypr/scripts/hyprlock.sh"
          else
            hyprlock
          fi
          ;;
        poweroff)
          systemctl poweroff
          ;;
        reboot)
          systemctl reboot
          ;;
        suspend)
          systemctl suspend
          ;;
      esac
  become_user: "{{ local_user }}"

- name: Persist Wofi CPU power profile menu script in dotfiles
  copy:
    dest: "/home/{{ local_user }}/.dotfiles/.config/wofi/scripts/cpu-power-menu.sh"
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      if ! command -v powerprofilesctl >/dev/null 2>&1; then
        command -v notify-send >/dev/null 2>&1 && notify-send -a 'CPU Power Menu' 'Power profile error' 'powerprofilesctl is not installed' >/dev/null 2>&1 || true
        exit 1
      fi

      if [ "$#" -gt 0 ]; then
        choice="${1}"
      else
        # Desktop launch via wofi --show drun can race with another wofi instance.
        # Short delay avoids intermittent empty selection/menu spawn failures.
        sleep 0.2
        choice="$(printf '%s\n' power-saver balanced performance | wofi --dmenu --prompt 'CPU Power')"
      fi

      [ -n "${choice}" ] || exit 0

      case "${choice}" in
        power-saver|balanced|performance)
          if powerprofilesctl set "${choice}" >/dev/null 2>&1; then
            active_profile="$(powerprofilesctl get 2>/dev/null || printf '%s' "${choice}")"
            command -v notify-send >/dev/null 2>&1 && notify-send -a 'CPU Power Menu' 'Power profile changed' "Active: ${active_profile}" >/dev/null 2>&1 || true
          else
            command -v notify-send >/dev/null 2>&1 && notify-send -a 'CPU Power Menu' 'Power profile error' "Failed to set: ${choice}" >/dev/null 2>&1 || true
            exit 1
          fi
          ;;
        *)
          command -v notify-send >/dev/null 2>&1 && notify-send -a 'CPU Power Menu' 'Power profile error' "Unknown option: ${choice}" >/dev/null 2>&1 || true
          exit 1
          ;;
      esac
  become_user: "{{ local_user }}"

- name: Ensure desktop applications directory exists in dotfiles
  file:
    path: "/home/{{ local_user }}/.dotfiles/.local/share/applications"
    state: directory
    mode: '0755'
  become_user: "{{ local_user }}"

- name: Persist CPU power menu desktop launcher in dotfiles
  copy:
    dest: "/home/{{ local_user }}/.dotfiles/.local/share/applications/cpu-power-menu.desktop"
    mode: '0644'
    content: |
      [Desktop Entry]
      Type=Application
      Version=1.0
      Name=CPU Power Menu
      Comment=Select power profile with Wofi
      Exec=/home/{{ local_user }}/.config/wofi/scripts/cpu-power-menu.sh
      Terminal=false
      Categories=System;Settings;
      Keywords=cpu;power;profile;performance;balanced;power-saver;
      StartupNotify=false
  become_user: "{{ local_user }}"

- name: Remove direct hyprpolkitagent autostart to avoid portal startup noise
  lineinfile:
    path: "/home/{{ local_user }}/.dotfiles/.config/hypr/hyprland/autostart.conf"
    regexp: '^exec-once\s*=\s*(systemctl --user start hyprpolkitagent|bash -c ''systemctl --user start hyprpolkitagent >/dev/null 2>&1 \|\| true'')\s*$'
    state: absent
  become_user: "{{ local_user }}"

- name: Check available Hyprland keybind config candidates
  stat:
    path: "/home/{{ local_user }}/.dotfiles/{{ item }}"
  loop:
    - .config/hypr/hyprland/keybinds.conf
    - .config/hypr/hyprland/keybindings.conf
    - .config/hypr/hyprland/binds.conf
    - .config/hypr/hyprland.conf
  register: hypr_keybind_candidates
  become_user: "{{ local_user }}"

- name: Set Hyprland keybind config path
  set_fact:
    hypr_keybind_config_path: "{{ (hypr_keybind_candidates.results | selectattr('stat.exists') | map(attribute='item') | list | first) | default('') }}"

- name: Ensure Hyprland keybind config was found
  assert:
    that:
      - hypr_keybind_config_path != ''
    fail_msg: "Could not find a Hyprland keybind config in dotfiles"

- name: Persist Mod+Escape Wofi power menu keybind in Hyprland dotfiles
  lineinfile:
    path: "/home/{{ local_user }}/.dotfiles/{{ hypr_keybind_config_path }}"
    regexp: '^\s*bind\s*=\s*\$mainMod\s*,\s*Escape\s*,\s*exec\s*,\s*~/.config/wofi/scripts/powermenu\.sh\s*$'
    line: 'bind = $mainMod, Escape, exec, ~/.config/wofi/scripts/powermenu.sh'
    insertafter: EOF
  become_user: "{{ local_user }}"

- name: Persist Inter font stack in UI dotfiles
  lineinfile:
    path: "/home/{{ local_user }}/.dotfiles/{{ item }}"
    regexp: '^\s*font-family:.*$'
    line: '    font-family: "Inter Variable", "Inter", sans-serif;'
  loop:
    - .config/waybar/colors.css
    - .config/wofi/style.css
    - .config/matugen/templates/waybar.css
    - .config/matugen/templates/wofi.css
  become_user: "{{ local_user }}"

- name: Read Inter font source files from dotfiles repo
  slurp:
    src: "/home/{{ local_user }}/.dotfiles/{{ item.path }}"
  loop:
    - { path: '.config/waybar/colors.css', regex: 'font-family:\s*"Inter Variable",\s*"Inter",\s*sans-serif;' }
    - { path: '.config/wofi/style.css', regex: 'font-family:\s*"Inter Variable",\s*"Inter",\s*sans-serif;' }
    - { path: '.config/matugen/templates/waybar.css', regex: 'font-family:\s*"Inter Variable",\s*"Inter",\s*sans-serif;' }
    - { path: '.config/matugen/templates/wofi.css', regex: 'font-family:\s*"Inter Variable",\s*"Inter",\s*sans-serif;' }
  register: dotfiles_font_files
  become_user: "{{ local_user }}"

- name: Ensure Inter font stack is present in UI dotfiles
  assert:
    that:
      - (item.content | b64decode | regex_search(item.item.regex)) is not none
    fail_msg: "Inter font stack check failed for {{ item.item.path }}"
  loop: "{{ dotfiles_font_files.results }}"
  loop_control:
    label: "{{ item.item.path }}"

- name: Read 2K scaling source files from dotfiles repo
  slurp:
    src: "/home/{{ local_user }}/.dotfiles/{{ item.path }}"
  loop:
    - { path: '.config/hypr/hyprland/monitors.conf', regex: '2560x1440@' }
    - { path: '.config/waybar/colors.css', regex: 'font-size:\s*12px;' }
    - { path: '.config/wofi/style.css', regex: 'font-size:\s*12px;' }
    - { path: '.config/swaync/style.css', regex: '--font-size-body:\s*9px;' }
    - { path: '.config/swaync/style.css', regex: '--font-size-summary:\s*10px;' }
    - { path: '.config/matugen/templates/waybar.css', regex: 'font-size:\s*12px;' }
    - { path: '.config/matugen/templates/wofi.css', regex: 'font-size:\s*12px;' }
  register: dotfiles_scaling_files
  become_user: "{{ local_user }}"

- name: Ensure dotfiles contain 2K scaling values
  assert:
    that:
      - (item.content | b64decode | regex_search(item.item.regex)) is not none
    fail_msg: "2K scaling check failed for {{ item.item.path }} with pattern {{ item.item.regex }}"
  loop: "{{ dotfiles_scaling_files.results }}"
  loop_control:
    label: "{{ item.item.path }}"

- name: Find top-level dotfiles entries
  find:
    paths: "/home/{{ local_user }}/.dotfiles"
    depth: 1
    excludes: ".git"
    file_type: any
    hidden: true
  register: dotfiles_entries

- name: Set backup directory for pre-existing dotfiles targets
  set_fact:
    dotfiles_backup_dir: "/home/{{ local_user }}/.dotfiles-backup-{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"

- name: Collect existing target metadata
  stat:
    path: "/home/{{ local_user }}/{{ item.path | basename }}"
    follow: false
  loop: "{{ dotfiles_entries.files }}"
  register: dotfiles_target_stats

- name: Create backup directory when existing non-symlink targets are found
  file:
    path: "{{ dotfiles_backup_dir }}"
    state: directory
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: '0755'
  when: dotfiles_target_stats.results | selectattr('stat.exists') | rejectattr('stat.islnk') | list | length > 0

- name: Backup existing non-symlink targets
  command:
    argv:
      - mv
      - "{{ item.stat.path }}"
      - "{{ dotfiles_backup_dir }}/"
  loop: "{{ dotfiles_target_stats.results }}"
  when:
    - item.stat.exists
    - not (item.stat.islnk | default(false))
  become_user: "{{ local_user }}"

- name: Remove existing symlink targets before relinking
  file:
    path: "{{ item.stat.path }}"
    state: absent
  loop: "{{ dotfiles_target_stats.results }}"
  when:
    - item.stat.exists
    - item.stat.islnk | default(false)

- name: Create symlinks for dotfiles
  file:
    src: "{{ item.path }}"
    dest: "/home/{{ local_user }}/{{ item.path | basename }}"
    state: link
    owner: "{{ local_user }}"
    force: true
  loop: "{{ dotfiles_entries.files }}"
  become_user: "{{ local_user }}"
