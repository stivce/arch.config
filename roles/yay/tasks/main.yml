---
- name: Install git and base-devel (yay build dependencies)
  pacman:
    name:
      - git
      - base-devel
    state: present

- name: Clone yay AUR repository
  git:
    repo: https://aur.archlinux.org/yay.git
    dest: /tmp/yay
    update: true
  become_user: "{{ local_user }}"

- name: Build and install yay
  command:
    cmd: makepkg -si --noconfirm
    chdir: /tmp/yay
  args:
    creates: /usr/bin/yay
  become_user: "{{ local_user }}"
