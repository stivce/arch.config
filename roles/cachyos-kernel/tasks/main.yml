---
- name: Add CachyOS repository to pacman.conf
  blockinfile:
    path: /etc/pacman.conf
    marker: "# {mark} CachyOS"
    block: |
      [cachyos]
      Server = https://mirror.cachyos.org/repo/x86_64/$repo

- name: Initialize CachyOS keyring
  command: pacman-key --recv-key 882DCFE48E2051D48E2562ABF3B607488DB35A47 --keyserver keyserver.ubuntu.com
  changed_when: false

- name: Sign CachyOS key
  command: pacman-key --lsign-key 882DCFE48E2051D48E2562ABF3B607488DB35A47
  changed_when: false

- name: Remove stale pacman lock
  file:
    path: /var/lib/pacman/db.lck
    state: absent

- name: Install CachyOS kernel
  pacman:
    update_cache: true
    name:
      - linux-cachyos
      - linux-cachyos-headers
    state: present

- name: Read kernel command line
  slurp:
    src: /proc/cmdline
  register: proc_cmdline
  changed_when: false

- name: Parse kernel command line values
  set_fact:
    root_uuid: "{{ ((proc_cmdline.content | b64decode | trim) | regex_findall('root=UUID=([^ ]+)') | first | default('')) }}"
    extra_params: >-
      {{
        ((proc_cmdline.content | b64decode | trim).split()
        | reject('match', '^(BOOT_IMAGE=|root=|initrd=)')
        | list)
        | join(' ')
      }}

- name: Ensure root UUID exists in current cmdline
  assert:
    that:
      - root_uuid | length > 0
    fail_msg: "Unable to determine root UUID from /proc/cmdline"

- name: Find EFI mount point at /boot/efi
  command: findmnt -n -o TARGET /boot/efi
  register: efi_mount_efi
  changed_when: false
  failed_when: false

- name: Find EFI mount point at /boot when /boot/efi missing
  command: findmnt -n -o TARGET /boot
  register: efi_mount_boot
  changed_when: false
  failed_when: false
  when: efi_mount_efi.rc != 0

- name: Set EFI mount point fact
  set_fact:
    efi_mount: "{{ efi_mount_efi.stdout if efi_mount_efi.rc == 0 else efi_mount_boot.stdout }}"

- name: Ensure EFI mount point was discovered
  assert:
    that:
      - efi_mount | length > 0
    fail_msg: "Unable to detect EFI mount point at /boot/efi or /boot"

- name: Find EFI partition device
  command: findmnt -n -o SOURCE {{ efi_mount }}
  register: efi_device
  changed_when: false

- name: Set EFI disk and partition facts
  set_fact:
    efi_disk: "{{ efi_device.stdout | regex_replace('p?[0-9]+$', '') }}"
    efi_part: "{{ (efi_device.stdout | regex_findall('[0-9]+$') | first | default('')) }}"

- name: Ensure EFI disk and partition parsing succeeded
  assert:
    that:
      - efi_disk | length > 0
      - efi_part | length > 0
    fail_msg: "Unable to parse EFI disk/partition from {{ efi_device.stdout }}"

- name: Copy kernel to EFI partition
  copy:
    src: /boot/vmlinuz-linux-cachyos
    dest: "{{ efi_mount }}/vmlinuz-linux-cachyos"
    remote_src: yes
    mode: '0644'

- name: Copy initramfs to EFI partition
  copy:
    src: /boot/initramfs-linux-cachyos.img
    dest: "{{ efi_mount }}/initramfs-linux-cachyos.img"
    remote_src: yes
    mode: '0644'

- name: Read current EFI boot entries
  command: efibootmgr -v
  register: efi_boot_entries
  changed_when: false

- name: Create CachyOS EFI boot entry
  command: >
    efibootmgr --create
    --disk {{ efi_disk }}
    --part {{ efi_part }}
    --loader /vmlinuz-linux-cachyos
    --label CachyOS
    --unicode "root=UUID={{ root_uuid }} rw initrd=\initramfs-linux-cachyos.img {{ extra_params }}"
  register: efi_result
  when: "'CachyOS' not in efi_boot_entries.stdout"

- name: Re-read EFI boot entries
  command: efibootmgr -v
  register: efi_boot_entries_after
  changed_when: false

- name: Ensure CachyOS EFI boot entry exists
  assert:
    that:
      - "'CachyOS' in efi_boot_entries_after.stdout"
    fail_msg: "CachyOS EFI boot entry was not found after creation"

- name: Determine CachyOS boot number
  set_fact:
    cachyos_bootnum: "{{ (efi_boot_entries_after.stdout | regex_findall('Boot([0-9A-Fa-f]{4})\\*?\\s+CachyOS') | first | default('')) }}"

- name: Read current EFI boot order
  command: efibootmgr
  register: efi_boot_order
  changed_when: false

- name: Build desired EFI boot order
  set_fact:
    current_boot_order: "{{ (efi_boot_order.stdout | regex_findall('BootOrder:\\s*([0-9A-Fa-f,]+)') | first | default('')) }}"

- name: Build desired EFI boot order value
  set_fact:
    desired_boot_order: >-
      {{
        ([cachyos_bootnum] +
        (current_boot_order.split(',')
        | reject('equalto', cachyos_bootnum)
        | list))
        | reject('equalto', '')
        | join(',')
      }}

- name: Ensure CachyOS boot number was parsed
  assert:
    that:
      - cachyos_bootnum | length > 0
    fail_msg: "Unable to parse CachyOS boot number from efibootmgr output"

- name: Set CachyOS as first boot option
  command: efibootmgr -o {{ desired_boot_order }}
  when: desired_boot_order | length > 0 and current_boot_order != desired_boot_order

- name: Remove old Arch kernel packages
  pacman:
    name:
      - linux
      - linux-headers
    state: absent
