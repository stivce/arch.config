---
- name: Install desktop utility packages
  pacman:
    name:
      - brightnessctl
      - playerctl
      - cliphist
      - wl-clipboard
      - nautilus
      - gvfs
      - telegram-desktop
      - fastfetch
    state: present

- name: Check whether desktop AUR packages are installed
  command: pacman -Q {{ item }}
  register: desktop_aur_query
  changed_when: false
  failed_when: false
  loop:
    - localsend-bin
    - helium-browser-beta-bin

- name: Install missing desktop AUR packages
  command: yay -S --noconfirm --needed {{ item.item }}
  become_user: "{{ local_user }}"
  loop: "{{ desktop_aur_query.results }}"
  when: item.rc != 0
