---
- name: Install ccache
  pacman:
    name: ccache
    state: present

- name: Set native arch CFLAGS (handle multiline original)
  shell: |
    python3 - <<'EOF'
    import re
    with open('/etc/makepkg.conf', 'r') as f:
        content = f.read()
    new = 'CFLAGS="-march=native -O2 -pipe -fno-plt -fexceptions -Wp,-D_FORTIFY_SOURCE=3 -Wformat -Werror=format-security -fstack-clash-protection -fcf-protection -fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"'
    content = re.sub(r'^#?CFLAGS=.*?(?:\\\n.*?)*', new, content, flags=re.MULTILINE)
    with open('/etc/makepkg.conf', 'w') as f:
        f.write(content)
    EOF
  changed_when: false

- name: Set CXXFLAGS to match CFLAGS (handle multiline original)
  shell: |
    python3 - <<'EOF'
    import re
    with open('/etc/makepkg.conf', 'r') as f:
        content = f.read()
    new = 'CXXFLAGS="$CFLAGS -Wp,-D_GLIBCXX_ASSERTIONS"'
    content = re.sub(r'^#?CXXFLAGS=.*?(?:\\\n.*?)*', new, content, flags=re.MULTILINE)
    with open('/etc/makepkg.conf', 'w') as f:
        f.write(content)
    EOF
  changed_when: false

- name: Use all cores for compilation
  lineinfile:
    path: /etc/makepkg.conf
    regexp: '^#?MAKEFLAGS='
    line: 'MAKEFLAGS="-j$(nproc)"'

- name: Enable ccache in BUILDENV
  lineinfile:
    path: /etc/makepkg.conf
    regexp: '^#?BUILDENV='
    line: 'BUILDENV=(!distcc color ccache check !sign)'

- name: Use tmpfs for builds
  lineinfile:
    path: /etc/makepkg.conf
    regexp: '^#?BUILDDIR='
    line: 'BUILDDIR=/tmp/makepkg'

- name: Use multi-threaded compression
  lineinfile:
    path: /etc/makepkg.conf
    regexp: '^#?COMPRESSXZ='
    line: 'COMPRESSXZ=(xz -c -z --threads=0 -)'

- name: Use zstd for package compression
  lineinfile:
    path: /etc/makepkg.conf
    regexp: '^#?PKGEXT='
    line: "PKGEXT='.pkg.tar.zst'"

- name: Verify makepkg.conf syntax
  command: bash -n /etc/makepkg.conf
  changed_when: false
