---
- name: Install NVIDIA drivers (RTX 40xx series)
  pacman:
    name: nvidia-dkms
    state: present

- name: Install NVIDIA utilities
  pacman:
    name: nvidia-settings
    state: present

- name: Preserve VRAM on suspend
  copy:
    dest: /etc/modprobe.d/nvidia-power.conf
    content: |
      options nvidia NVreg_PreserveVideoMemoryAllocations=1
    mode: '0644'

- name: Enable nvidia-persistenced for reduced GPU init latency
  systemd:
    name: nvidia-persistenced.service
    enabled: true

- name: Enable nvidia suspend/resume/hibernate services
  systemd:
    name: "{{ item }}"
    enabled: true
  loop:
    - nvidia-suspend.service
    - nvidia-resume.service
    - nvidia-hibernate.service
