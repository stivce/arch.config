---
- name: Reload udev scheduler rules
  command: udevadm control --reload-rules
  listen: Reload udev scheduler rules

- name: Trigger block devices for scheduler rules
  command: udevadm trigger --subsystem-match=block
  listen: Reload udev scheduler rules

- name: Restart cpupower
  systemd:
    name: cpupower.service
    state: restarted
  listen: Restart cpupower
