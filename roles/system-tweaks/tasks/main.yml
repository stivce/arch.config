---
- name: Install zram-generator and cpupower
  pacman:
    name:
      - zram-generator
      - cpupower
    state: present

- name: Configure zram swap (half of RAM, zstd)
  copy:
    dest: /etc/systemd/zram-generator.conf
    content: |
      [zram0]
      zram-size = ram / 2
      compression-algorithm = zstd
    mode: '0644'

- name: Set NVMe I/O scheduler to none via udev
  copy:
    dest: /etc/udev/rules.d/60-ioscheduler.rules
    content: |
      ACTION=="add|change", SUBSYSTEM=="block", KERNEL=="nvme[0-9]n[0-9]", ATTR{queue/scheduler}="none"
      ACTION=="add|change", SUBSYSTEM=="block", KERNEL=="sd[a-z]", ATTR{queue/rotational}=="0", ATTR{queue/scheduler}="mq-deadline"
    mode: '0644'
  notify: Reload udev scheduler rules

- name: Configure cpupower governor to schedutil
  copy:
    dest: /etc/default/cpupower
    content: |
      # Managed by Ansible
      governor='schedutil'
      min_freq='0'
      max_freq='0'
    mode: '0644'
  notify: Restart cpupower

- name: Remove legacy tmpfiles CPU governor rule
  file:
    path: /etc/tmpfiles.d/cpu-governor.conf
    state: absent

- name: Cap journald log size
  lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?SystemMaxUse='
    line: 'SystemMaxUse=500M'

- name: Tune vm settings, enable tcp_bbr and hugepages
  copy:
    dest: /etc/sysctl.d/99-laptop.conf
    content: |
      vm.swappiness=10
      vm.vfs_cache_pressure=50
      # TCP BBR congestion control + fq for better throughput/latency
      net.core.default_qdisc=fq
      net.ipv4.tcp_congestion_control=bbr
      # Network buffer tuning
      net.core.rmem_max=16777216
      net.core.wmem_max=16777216
    mode: '0644'

- name: Apply transparent hugepage mode through tmpfiles at boot
  copy:
    dest: /etc/tmpfiles.d/transparent-hugepage.conf
    mode: '0644'
    content: |
      w /sys/kernel/mm/transparent_hugepage/enabled - - - - madvise

- name: Load tcp_bbr module
  copy:
    dest: /etc/modules-load.d/bbr.conf
    content: |
      tcp_bbr
    mode: '0644'

- name: Ensure cpupower service is enabled and started
  systemd:
    name: cpupower.service
    enabled: true
    state: started
