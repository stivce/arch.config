---
- name: Install Hyprland
  hosts: localhost
  connection: local
  become: true
  vars:
    local_user: "{{ lookup('env', 'SUDO_USER') | default('') }}"
  pre_tasks:
    - name: Ensure playbook is run with sudo
      assert:
        that: local_user != ''
        fail_msg: "local_user is empty. Run the playbook with sudo (not as root directly), or pass -e local_user=<username>"
  roles:
    - yay
    - zen-browser
    - theming
    - screenshot
    - hyprland
    - nvidia
    - kitty
    - battlenet

- name: Install system packages
  hosts: localhost
  connection: local
  become: true
  vars:
    local_user: "{{ lookup('env', 'SUDO_USER') | default('') }}"
  roles:
    - makepkg-optimization
    - pacman-optimization
    - system-tweaks
    - fonts
    - zsh
    - awww
    - bluetooth
    - audio
    - thunar
    - polkit
    - swaync
    - hyprlock
    - hypridle
    - xdg-portal
    - wl-clipboard
