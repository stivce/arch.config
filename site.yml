---
- name: System configuration
  hosts: local
  become: true
  vars:
    local_user: "{{ ansible_user }}"
  roles:
    - makepkg-optimization
    - yay
    - cachyos-kernel
    - boot-optimization
    - pacman-optimization
    - system-tweaks
    - nvidia
    - audio
    - bluetooth
    - hyprland
    - hyprland-ecosystem
    - hybrid-power
    - system-health-remediation
    - desktop-utils
    - fonts
    - theming
    - shell
