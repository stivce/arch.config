---
- name: System configuration
  hosts: localhost
  connection: local
  become: true
  vars:
    local_user: "{{ lookup('env', 'SUDO_USER') | default('') }}"
  pre_tasks:
    - name: Ensure playbook is run with sudo
      assert:
        that: local_user != ''
        fail_msg: "local_user is empty. Run with sudo, not as root directly."
  roles:
    - yay
    - boot-optimization
    - makepkg-optimization
    - pacman-optimization
    - system-tweaks
    - nvidia
    - audio
    - bluetooth
    - hyprland
    - hyprland-ecosystem
    - desktop-utils
    - fonts
    - theming
    - shell
